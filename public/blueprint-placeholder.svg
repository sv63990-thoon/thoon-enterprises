<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2a30" stroke-width="0.5" opacity="0.2"/>
      <path d="M 0 40 L 40 40 40 0" fill="none" stroke="#1f2a30" stroke-width="0.5" opacity="0.2"/>
    </pattern>
    <pattern id="diagonal" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 0 80 L 80 0" fill="none" stroke="#1f2a30" stroke-width="0.3" opacity="0.1"/>
      <path d="M 0 0 L 80 80" fill="none" stroke="#1f2a30" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="#eef2ff"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <rect width="100%" height="100%" fill="url(#diagonal)"/>
  <text x="960" y="540" font-family="Arial, sans-serif" font-size="48" fill="#1f2a30" opacity="0.05" text-anchor="middle">
    CONSTRUCTION BLUEPRINT
  </text>
</svg>
